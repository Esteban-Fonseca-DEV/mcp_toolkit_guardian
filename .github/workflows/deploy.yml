name: Guardian CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: us-east-2
  NODE_VERSION: '24'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bundle Lambda
        run: bash scripts/bundle-lambda.sh

      - name: Prepare Lambda Layer
        run: |
          rm -rf layers/shared
          mkdir -p layers/shared/nodejs/node_modules/typescript/lib
          TYPESCRIPT_DIR=$(find node_modules/.pnpm -maxdepth 1 -type d -name "typescript@5*" | head -1)
          if [ -n "$TYPESCRIPT_DIR" ]; then
            cp "$TYPESCRIPT_DIR/node_modules/typescript/package.json" layers/shared/nodejs/node_modules/typescript/
            cp "$TYPESCRIPT_DIR/node_modules/typescript/lib/typescript.js" layers/shared/nodejs/node_modules/typescript/lib/
          fi

      - name: Install CDK globally
        run: npm install -g aws-cdk

      - name: CDK Deploy
        working-directory: infra
        run: |
          pnpm install --no-frozen-lockfile
          cdk deploy --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Output API URL
        working-directory: infra
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name GuardianStack --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          echo "🚀 Guardian API deployed at: $API_URL"
