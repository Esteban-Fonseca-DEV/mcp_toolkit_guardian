name: Guardian Quick Audit
on:
  pull_request:
    paths:
      - 'packages/**/*.ts'
      - 'patient-repo/**/*.ts'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - name: Guardian Self-Audit
        run: npx guardian audit ./patient-repo --fail-on error
